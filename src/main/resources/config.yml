# EssentialsC 配置文件
# 你可以编辑此文件来自定义插件行为

# 语言设置
# 可用语言: en_US, zh_CN (你可以添加更多)
language: "zh_CN"

# 通用设置
settings:
  # 启用或禁用命令反馈消息
  enable-feedback: true

# 功能方块菜单配置
blocks-menu:
  title: "&6&lEssentialsC &8- &e&l功能方块菜单"
  items:
    workbench:
      slot: 10
      material: CRAFTING_TABLE
      name: "&e工作台"
      lore:
        - "&7/workbench"
        - "&7打开工作台"
      permission: essentialsc.command.workbench
    anvil:
      slot: 11
      material: ANVIL
      name: "&e铁砧"
      lore:
        - "&7/anvil"
        - "&7打开铁砧"
      permission: essentialsc.command.anvil
    cartographytable:
      slot: 19
      material: CARTOGRAPHY_TABLE
      name: "&e制图台"
      lore:
        - "&7/cartographytable"
        - "&7打开制图台"
      permission: essentialsc.command.cartographytable
    grindstone:
      slot: 20
      material: GRINDSTONE
      name: "&e砂轮"
      lore:
        - "&7/grindstone"
        - "&7打开砂轮"
      permission: essentialsc.command.grindstone
    loom:
      slot: 21
      material: LOOM
      name: "&e织布机"
      lore:
        - "&7/loom"
        - "&7打开织布机"
      permission: essentialsc.command.loom
    smithingtable:
      slot: 22
      material: SMITHING_TABLE
      name: "&e锻造台"
      lore:
        - "&7/smithingtable"
        - "&7打开锻造台"
      permission: essentialsc.command.smithingtable
    stonecutter:
      slot: 23
      material: STONECUTTER
      name: "&e切石机"
      lore:
        - "&7/stonecutter"
        - "&7打开切石机"
      permission: essentialsc.command.stonecutter
    enderchest:
      slot: 31
      material: ENDER_CHEST
      name: "&e末影箱"
      lore:
        - "&7/enderchest"
        - "&7打开末影箱"
      permission: essentialsc.command.enderchest

# 潜影盒设置
shulkerbox:
  # 潜影盒默认标题（当潜影盒没有自定义名称时使用）
  # 支持颜色代码（使用 & 符号）
  # 留空则使用 "Shulker Box"（客户端语言）
  default-title: "&e潜影盒"
