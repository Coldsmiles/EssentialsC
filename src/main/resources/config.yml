# EssentialsC 主配置文件

# 配置文件版本号
config-version: 2

# 语言文件名称，对应插件数据目录下 lang/<语言名>.yml
language: "zh_CN"

admin-mode:
  # 原版默认飞行速度为 0.1，这里 0.2 表示两倍飞行速度
  fly-speed: 0.2
  actionbar:
    # 管理模式状态提示的刷新间隔，单位为 tick
    interval-ticks: 40

jei-sync:
  # 是否启用 JEI 配方同步修复
  enabled: true
  # 是否输出调试日志
  debug: false
  # 是否在玩家加入时发送同步提示
  send-player-message: true

mob-drops:
  enderman:
    # 是否允许末影人掉落方块
    enabled: true

tpsbar:
  # 可选值：off / auto / on
  # auto: 若服务端没有原生 /tpsbar，则启用插件实现
  # on: 始终启用插件实现；若服务端已有原生命令，则自动跳过以避免冲突
  mode: auto

blocks-menu:
  # 菜单布局版本，用于后续自动迁移槽位布局
  layout-version: 2
  sections:
    blocks:
      items:
        workbench:
          # 物品所在槽位
          slot: 10
          # 菜单图标材质
          material: CRAFTING_TABLE
          # 所需权限
          permission: essentialsc.command.workbench
          # 点击后执行的命令键
          command: workbench
        enderchest:
          slot: 11
          material: ENDER_CHEST
          permission: essentialsc.command.enderchest
          command: enderchest
        anvil:
          slot: 12
          material: ANVIL
          permission: essentialsc.command.anvil
          command: anvil
        grindstone:
          slot: 19
          material: GRINDSTONE
          permission: essentialsc.command.grindstone
          command: grindstone
        smithingtable:
          slot: 20
          material: SMITHING_TABLE
          permission: essentialsc.command.smithingtable
          command: smithingtable
        stonecutter:
          slot: 21
          material: STONECUTTER
          permission: essentialsc.command.stonecutter
          command: stonecutter
        loom:
          slot: 28
          material: LOOM
          permission: essentialsc.command.loom
          command: loom
        cartographytable:
          slot: 29
          material: CARTOGRAPHY_TABLE
          permission: essentialsc.command.cartographytable
          command: cartographytable
    shortcuts:
      items:
        nightvision:
          slot: 14
          material: TINTED_GLASS
          permission: essentialsc.command.nightvision
          command: nightvision
        glow:
          slot: 15
          material: GLOWSTONE
          permission: essentialsc.command.glow
          command: glow
