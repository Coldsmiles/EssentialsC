    - ok_hand-👌
    - pray-🙏
    - fire-🔥
    - poop-💩
    - party_popper-🎉
    - balloon-🎈
    - trophy-🏆
    - coffee-☕
    - warning-⚠
    - question_mark-❓
    - exclamation_mark-❗
    - hourglass-⌛
    - light_bulb-💡
    - camera-📷
    - video_game-🎮
    - laptop-💻
    - rocket-🚀
    - sparkle_heart-💖
