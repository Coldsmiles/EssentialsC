RandomTeleportation:
  # 随机传送指令冷却时间
  Cooldown: 5
  # 插件会尝试多少次以寻找安全的随机传送地点
  # 尽量设置的低一些，即便一次没有找到安全坐标，玩家还可以多次尝试, as player always can try again after delay
  MaxTries: 20
  # 以下生物群系不会被传送到
  ExcludedBiomes:
  - Ocean
  - Deep ocean
  - Deep cold ocean
  - Cold ocean
  - Deep lukewarm ocean
  - Lukewarm ocean
  - Warm ocean
  - River
  # 设置为true，将自动为识别到的所有世界设置随机传送设置
  # 设置为false，则不会有自动设置，但你可以手动将世界设置添加到下方
  AutoGenerateWorlds: true
  Worlds:
    world:
      # 启用随机传送
      Enabled: true
      MaxTries: 0
      # 最大半径和最小半径
      Range:
        Max: 1000
        Min: 500
      # 随机传送中心XZ坐标
      Center:
        X: 0
        Z: 0
      # 随机传送范围是否是圆形？设置为false则为方形
      Circle: false
      # 是否不会传送到水里/岩浆里/树叶上/细雪里，或者自定义的方块表面，或者特定生物群系
      Ignore:
        Water: true
        Lava: true
        Leaves: true
        PowderSnow: false
        CrawlSpaces: false
        Materials: []
        Biomes: []
      # 优先考虑传送到的生物群系  
      PreferredBiomes: []
      # 是否只传送到地表
      SurfaceOnly: false
      # 允许传送到别的世界
      FromAnotherWorld: true
      # 需要传送到世界的权限
      RequireWorldPermission: false
      # 允许传送到的Y轴高度
      YLimits:
        Min: -64
        Max: 320
    world_nether:
      Enabled: true
      MaxTries: 0
      Cooldown: 0
      Range:
        Max: 1000
        Min: 500
      Center:
        X: 0
        Z: 0
      Circle: false
      Ignore:
        Water: true
        Lava: true
        Leaves: true
        PowderSnow: false
        CrawlSpaces: false
        Materials: []
        Biomes: []
      PreferredBiomes: []
      SurfaceOnly: false
      FromAnotherWorld: true
      RequireWorldPermission: false
      YLimits:
        Min: 0
        Max: 128
    world_the_end:
      Enabled: true
      MaxTries: 0
      Cooldown: 0
      Range:
        Max: 1000
        Min: 500
      Center:
        X: 0
        Z: 0
      Circle: false
      Ignore:
        Water: true
        Lava: true
        Leaves: true
        PowderSnow: false
        CrawlSpaces: false
        Materials: []
        Biomes: []
      PreferredBiomes: []
      SurfaceOnly: false
      FromAnotherWorld: true
      RequireWorldPermission: false
      YLimits:
        Min: 0
        Max: 256
